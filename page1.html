<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Luz dans le Cœur</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700;900&family=Jost:wght@200;300;400&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;}
html,body{height:100%;overflow:hidden;}
body{
  background:#2d8a4e;
  font-family:'Jost',sans-serif;
  cursor:none;
  position:relative;
}

/* CURSOR */
#cur{position:fixed;width:10px;height:10px;border-radius:50%;background:#1a1a1a;pointer-events:none;z-index:9999;transform:translate(-50%,-50%);transition:width .2s,height .2s;mix-blend-mode:multiply;}
#curRing{position:fixed;width:36px;height:36px;border-radius:50%;border:1.5px solid rgba(26,26,26,.3);pointer-events:none;z-index:9998;transform:translate(-50%,-50%);transition:width .25s,height .25s;}

/* NAV */
nav{
  position:fixed;top:0;left:0;right:0;z-index:100;
  display:flex;align-items:center;justify-content:space-between;
  padding:20px 36px;
}
.nav-logo{
  font-family:'Jost',sans-serif;font-size:11px;font-weight:300;
  letter-spacing:3px;text-transform:uppercase;color:#1a1a1a;
}
.nav-links{display:flex;gap:32px;}
.nav-link{
  font-family:'Jost',sans-serif;font-size:11px;font-weight:300;
  letter-spacing:2px;text-transform:uppercase;color:#1a1a1a;
  text-decoration:none;cursor:pointer;transition:opacity .3s;
}
.nav-link:hover{opacity:.6;}

/* MAIN CONTENT */
.hero{
  position:absolute;inset:0;
  display:flex;flex-direction:column;
  justify-content:space-between;
  padding:100px 36px 0;
  overflow:hidden;
}

.hero-text{
  text-align:center;
  max-width:860px;
  margin:0 auto;
  animation:fadeUp .9s ease both;
}
@keyframes fadeUp{from{opacity:0;transform:translateY(20px);}to{opacity:1;transform:translateY(0);}}

.hero-intro{
  font-family:'Playfair Display',serif;
  font-size:clamp(18px,2.8vw,30px);
  font-weight:400;
  color:#1a1a1a;
  line-height:1.55;
  margin-bottom:28px;
  letter-spacing:-.3px;
  animation:fadeUp .9s .15s ease both;
}
.hero-welcome{
  font-family:'Jost',sans-serif;font-size:13px;font-weight:200;
  letter-spacing:4px;text-transform:uppercase;color:rgba(26,26,26,.65);
  margin-bottom:18px;
  animation:fadeUp .9s .05s ease both;
}

/* BIG BRAND NAME */
.brand-name{
  position:absolute;bottom:-20px;left:-8px;right:-8px;
  font-family:'Playfair Display',serif;
  font-size:clamp(90px,18vw,220px);
  font-weight:900;
  color:#1a1a1a;
  line-height:1;
  letter-spacing:-4px;
  text-align:center;
  white-space:nowrap;
  animation:fadeUp 1s .3s ease both;
  user-select:none;
}

/* PAGE TURN ARROW */
.page-arrow{
  position:fixed;right:0;top:50%;transform:translateY(-50%);
  z-index:200;
  display:flex;flex-direction:column;align-items:center;
  gap:10px;padding:20px 14px;
  background:rgba(26,26,26,.08);
  border-radius:16px 0 0 16px;
  cursor:pointer;
  transition:all .35s;
  backdrop-filter:blur(4px);
}
.page-arrow:hover{
  background:rgba(26,26,26,.18);
  padding-right:22px;
}
.page-arrow:hover .arrow-icon{transform:translateX(4px);}
.arrow-icon{
  font-size:22px;color:#1a1a1a;
  transition:transform .3s;
  line-height:1;
}
.arrow-label{
  font-family:'Jost',sans-serif;font-size:9px;font-weight:200;
  letter-spacing:3px;text-transform:uppercase;color:rgba(26,26,26,.55);
  writing-mode:vertical-rl;transform:rotate(180deg);
}
.arrow-page-num{
  font-family:'Playfair Display',serif;font-size:11px;
  color:rgba(26,26,26,.4);font-style:italic;
}

/* PAGE DOTS */
.page-dots{
  position:fixed;bottom:28px;left:50%;transform:translateX(-50%);
  z-index:200;display:flex;gap:8px;
}
.pdot{width:7px;height:7px;border-radius:50%;cursor:pointer;transition:all .3s;}
.pdot.on{background:#1a1a1a;}
.pdot.off{background:rgba(26,26,26,.25);}

/* CURTAIN */
.curtain{
  position:fixed;inset:0;z-index:5000;pointer-events:none;
  background:#1a1a1a;transform:translateX(100%);
  transition:transform .65s cubic-bezier(.77,0,.18,1);
}
.curtain.going{transform:translateX(0);pointer-events:auto;}

/* === CAT IMAGE CURSOR === */
html, body, * {
  cursor: none !important;
}
#cur { display: none !important; }
#cur2 { display: none !important; }
#curRing { display: none !important; }
#curRing2 { display: none !important; }

/* Floating cat image that follows the mouse */
#cat-cursor {
  position: fixed;
  pointer-events: none;
  z-index: 99999;
  width: 72px;
  transform: translate(-36px, -36px);
  mix-blend-mode: multiply;
  filter: contrast(1.1);
  transition: none;
  image-rendering: auto;
}
</style>
</head>
<body>
<div id="cur"></div>
<div id="curRing"></div>
<div class="curtain" id="curtain"></div>

<nav>
  <div class="nav-logo">Luz dans le Cœur</div>
  <div class="nav-links">
    <span class="nav-link" onclick="goTo('page2.html')">Mon histoire</span>
    <span class="nav-link" onclick="goTo('page3.html')">Collection</span>
    <span class="nav-link" onclick="goTo('page2.html')">Commencer</span>
  </div>
</nav>

<div class="hero">
  <div class="hero-text">
    <div class="hero-welcome">Bienvenue</div>
    <p class="hero-intro">
      Des e-books écrits avec âme et intention.<br>
      Ici, chaque mot est une invitation<br>
      à te retrouver, à te transformer,<br>
      à t'épanouir pleinement.
    </p>
  </div>
  <div class="brand-name">Luz dans le Cœur</div>
</div>

<!-- ARROW RIGHT — page suivante -->
<div class="page-arrow" onclick="goTo('page2.html')">
  <div class="arrow-icon">›</div>
  <div class="arrow-label">Mon histoire</div>
  <div class="arrow-page-num">2</div>
</div>

<div class="page-dots">
  <div class="pdot on"></div>
  <div class="pdot off" onclick="goTo('page2.html')"></div>
  <div class="pdot off" onclick="goTo('page3.html')"></div>
</div>

<script>
const cur=document.getElementById('cur'),ring=document.getElementById('curRing');
let mx=0,my=0,rx=0,ry=0;
document.addEventListener('mousemove',e=>{mx=e.clientX;my=e.clientY;cur.style.left=mx+'px';cur.style.top=my+'px';});
(function af(){rx+=(mx-rx)*.1;ry+=(my-ry)*.1;ring.style.left=rx+'px';ring.style.top=ry+'px';requestAnimationFrame(af);})();
document.querySelectorAll('.page-arrow,.nav-link,.pdot').forEach(el=>{
  el.addEventListener('mouseenter',()=>{ring.style.width='50px';ring.style.height='50px';});
  el.addEventListener('mouseleave',()=>{ring.style.width='36px';ring.style.height='36px';});
});
function goTo(url){
  const c=document.getElementById('curtain');
  c.classList.add('going');
  // If going to page2 or page3, pass through loading screen
  const needsLoading = url==='page2.html'||url==='page3.html';
  const dest = needsLoading ? 'loading.html?next='+url : url;
  setTimeout(()=>{window.location.href=dest;},600);
}
</script>
