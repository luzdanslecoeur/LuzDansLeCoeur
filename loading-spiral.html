<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Chargement…</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital@1&family=Jost:wght@200;300&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;}
html,body{width:100%;height:100%;overflow:hidden;background:#030c06;}

/* Stars background */
.stars{position:fixed;inset:0;pointer-events:none;z-index:0;}
.star{position:absolute;border-radius:50%;animation:twinkle ease-in-out infinite alternate;}
@keyframes twinkle{from{opacity:.08;}to{opacity:.55;}}

/* Center scene */
.scene{
  position:fixed;inset:0;
  display:flex;flex-direction:column;
  align-items:center;justify-content:center;
  gap:32px;z-index:10;
}

/* Spiral container */
.spiral-outer{
  position:relative;
  width:160px;height:160px;
}

/* Main rotating SVG */
.spiral-svg{
  position:absolute;inset:0;
  width:160px;height:160px;
  animation:rotateCW 3s linear infinite;
  filter:drop-shadow(0 0 8px rgba(82,201,138,.45));
}
@keyframes rotateCW{from{transform:rotate(0deg);}to{transform:rotate(360deg);}}

/* Outer slow ring — counter rotate */
.ring-svg{
  position:absolute;inset:0;
  width:160px;height:160px;
  animation:rotateCCW 8s linear infinite;
  opacity:.35;
}
@keyframes rotateCCW{from{transform:rotate(0deg);}to{transform:rotate(-360deg);}}

/* Center glow dot */
.glow-dot{
  position:absolute;
  top:50%;left:50%;
  transform:translate(-50%,-50%);
  width:10px;height:10px;border-radius:50%;
  background:#52c98a;
  box-shadow:0 0 0 4px rgba(82,201,138,.2), 0 0 18px rgba(82,201,138,.7);
  animation:pulseDot 1.4s ease-in-out infinite;
  z-index:2;
}
@keyframes pulseDot{
  0%,100%{box-shadow:0 0 0 4px rgba(82,201,138,.2), 0 0 18px rgba(82,201,138,.7);}
  50%{box-shadow:0 0 0 10px rgba(82,201,138,.08), 0 0 30px rgba(82,201,138,.9);}
}

/* Orbiting dot */
.orbit-ring{
  position:absolute;inset:0;
  width:160px;height:160px;
  animation:rotateCW 2s linear infinite;
}
.orbit-dot{
  position:absolute;
  top:4px;left:50%;
  transform:translateX(-50%);
  width:6px;height:6px;border-radius:50%;
  background:#3de89a;
  box-shadow:0 0 8px rgba(61,232,154,.9);
}

/* Text */
.load-word{
  font-family:'Playfair Display',serif;
  font-size:13px;font-style:italic;letter-spacing:5px;
  color:rgba(82,201,138,.6);
  animation:wordPulse 2s ease-in-out infinite;
}
@keyframes wordPulse{0%,100%{opacity:.3;}50%{opacity:.9;}}

/* Progress bar */
.prog-wrap{
  width:160px;height:1px;
  background:rgba(82,201,138,.1);overflow:hidden;border-radius:1px;
}
.prog-fill{
  height:100%;width:0%;
  background:linear-gradient(90deg,rgba(82,201,138,.35),rgba(61,232,154,.9));
  transition:width .08s linear;
  border-radius:1px;
}

/* Particles */
.particle{
  position:fixed;border-radius:50%;
  pointer-events:none;z-index:8;
  animation:particleFade ease-out forwards;
}
@keyframes particleFade{
  0%{opacity:.8;transform:scale(1);}
  100%{opacity:0;transform:scale(0) translateY(-24px);}
}
</style>
</head>
<body>

<div class="stars" id="stars"></div>

<div class="scene">
  <div class="spiral-outer">

    <!-- Outer decorative ring with dashes -->
    <svg class="ring-svg" viewBox="0 0 160 160" xmlns="http://www.w3.org/2000/svg" fill="none">
      <circle cx="80" cy="80" r="74"
        stroke="rgba(82,201,138,.6)"
        stroke-width="1"
        stroke-dasharray="6 10"
        stroke-linecap="round"/>
      <circle cx="80" cy="80" r="74" r="68"
        stroke="rgba(82,201,138,.25)"
        stroke-width="0.5"
        stroke-dasharray="2 18"/>
    </svg>

    <!-- Main spiral — mathematically computed Archimedean spiral -->
    <svg class="spiral-svg" viewBox="0 0 160 160" xmlns="http://www.w3.org/2000/svg" fill="none">
      <!-- Concentric guide circles — very faint -->
      <circle cx="80" cy="80" r="60" stroke="rgba(82,201,138,.06)" stroke-width="0.5"/>
      <circle cx="80" cy="80" r="44" stroke="rgba(82,201,138,.07)" stroke-width="0.5"/>
      <circle cx="80" cy="80" r="28" stroke="rgba(82,201,138,.09)" stroke-width="0.5"/>
      <circle cx="80" cy="80" r="14" stroke="rgba(82,201,138,.12)" stroke-width="0.5"/>

      <!-- Archimedean spiral: r = a + bθ  
           Computed points: center(80,80), 3.5 turns, 200 segments
           x = cx + r*cos(θ),  y = cy + r*sin(θ)
           r grows from 4 to 64 over 3.5 turns (0 to 7π) -->
      <path d="
        M 84.0 80.0
        C 84.1 82.2 83.0 84.3 81.3 85.6
        C 78.8 87.6 75.5 87.9 72.6 86.8
        C 68.5 85.3 65.7 81.4 65.5 77.1
        C 65.2 71.5 68.7 66.3 73.9 64.1
        C 80.5 61.3 88.3 63.8 92.3 69.8
        C 97.2 77.2 95.6 87.4 88.7 92.9
        C 80.3 99.5 68.1 97.7 61.1 89.7
        C 53.0 80.4 54.8 65.7 63.7 57.2
        C 74.1 47.3 90.6 49.1 100.0 59.2
        C 110.6 70.8 108.6 89.5 97.3 100.3
        C 84.5 112.4 64.4 110.2 52.0 97.7
        C 38.5 83.9 40.9 61.4 54.4 47.6
        C 69.3 32.5 93.6 35.1 108.9 49.7
        C 125.3 65.6 122.5 91.8 106.9 107.7
        C 89.8 124.9 61.4 121.9 44.0 105.2
        C 25.3 87.2 28.4 56.9 46.1 38.9
        C 65.2 19.3 97.5 22.6 117.4 41.6
      "
      stroke="#52c98a"
      stroke-width="2"
      stroke-linecap="round"
      stroke-linejoin="round"
      opacity="0.92"/>

      <!-- Bright tip at the end of the spiral -->
      <circle cx="117.4" cy="41.6" r="3.5" fill="#3de89a" opacity="0.95"/>
      <circle cx="117.4" cy="41.6" r="7"   fill="rgba(61,232,154,.18)"/>

      <!-- Start dot at center -->
      <circle cx="84" cy="80" r="2" fill="rgba(82,201,138,.5)"/>

      <!-- Small accent dots at cardinal points on outer circle -->
      <circle cx="80"  cy="16"  r="1.8" fill="rgba(82,201,138,.5)"/>
      <circle cx="144" cy="80"  r="1.5" fill="rgba(82,201,138,.4)"/>
      <circle cx="80"  cy="144" r="1.5" fill="rgba(82,201,138,.4)"/>
      <circle cx="16"  cy="80"  r="1.5" fill="rgba(82,201,138,.4)"/>
    </svg>

    <!-- Orbiting dot (faster ring) -->
    <div class="orbit-ring"><div class="orbit-dot"></div></div>

    <!-- Center pulse -->
    <div class="glow-dot"></div>
  </div>

  <div class="load-word">chargement</div>

  <div class="prog-wrap">
    <div class="prog-fill" id="bar"></div>
  </div>
</div>

<script>
const params = new URLSearchParams(window.location.search);
const dest   = params.get('next') || 'alchimie-vente.html';
const DURATION = 1600;

// Stars
const starsEl = document.getElementById('stars');
for(let i=0;i<60;i++){
  const s=document.createElement('div');
  s.className='star';
  const sz=Math.random()*2+.5;
  s.style.cssText=`
    width:${sz}px;height:${sz}px;
    left:${Math.random()*100}%;
    top:${Math.random()*100}%;
    background:rgba(82,201,138,${(.15+Math.random()*.3).toFixed(2)});
    box-shadow:0 0 ${sz*2}px rgba(82,201,138,.5);
    animation-duration:${(2+Math.random()*3).toFixed(1)}s;
    animation-delay:${(Math.random()*3).toFixed(1)}s;
  `;
  starsEl.appendChild(s);
}

// Particles from spiral area
function spawnParticle(){
  const p=document.createElement('div');
  p.className='particle';
  const cx=window.innerWidth/2, cy=window.innerHeight/2;
  const a=Math.random()*Math.PI*2, r=40+Math.random()*40;
  const sz=Math.random()*4+1.5;
  p.style.cssText=`
    left:${cx+Math.cos(a)*r}px;
    top:${cy+Math.sin(a)*r}px;
    width:${sz}px;height:${sz}px;
    background:rgba(82,201,138,${(.3+Math.random()*.4).toFixed(2)});
    box-shadow:0 0 ${sz*2}px rgba(82,201,138,.7);
    animation-duration:${(.7+Math.random()*.5).toFixed(2)}s;
  `;
  document.body.appendChild(p);
  setTimeout(()=>{if(p.parentNode)p.parentNode.removeChild(p);},1100);
}
const ptInterval=setInterval(spawnParticle,140);

// Progress + redirect
const bar=document.getElementById('bar');
let start=null;
function animate(ts){
  if(!start) start=ts;
  const progress=Math.min((ts-start)/DURATION,1);
  bar.style.width=(progress*100)+'%';
  if(progress<1){ requestAnimationFrame(animate); }
  else{
    clearInterval(ptInterval);
    document.body.style.transition='opacity .4s ease';
    document.body.style.opacity='0';
    setTimeout(()=>{ window.location.href=dest; },420);
  }
}
requestAnimationFrame(animate);
</script>
</body>
</html>
